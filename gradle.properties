# Project-wide Gradle settings.

# Give the Gradle daemon room to work on larger builds.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Run independent modules in parallel where possible.
org.gradle.parallel=true

# AndroidX is the modern support-library namespace -> required.
android.useAndroidX=true

# Kotlin code style used by the Android plugin tooling.
kotlin.code.style=official

# Only generate the resource classes (R) each module actually needs.
android.nonTransitiveRClass=true
